name: Auto Create PR

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check if PR already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.check.outputs.count == '0'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commit details
        if: steps.check.outputs.count == '0'
        id: commits
        run: |
          BASE="main"
          LOG=$(git log origin/$BASE..HEAD --oneline 2>/dev/null || git log --oneline -10)
          FILES=$(git diff --name-only origin/$BASE..HEAD 2>/dev/null | head -30 || echo "(unable to diff)")
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          PUSHED: ${{ github.event.head_commit.timestamp }}
          COMMIT_LOG: ${{ steps.commits.outputs.log }}
          CHANGED_FILES: ${{ steps.commits.outputs.files }}
        run: |
          TITLE=$(echo "$BRANCH" | sed 's/[-_]/ /g' | sed 's/\b\(.\)/\u\1/g')

          cat > /tmp/pr-body.md << 'BODY_EOF'
          ## Summary

          Branch: `BRANCH_PLACEHOLDER`
          Author: ACTOR_PLACEHOLDER
          Pushed: PUSHED_PLACEHOLDER

          ## Commits
          ```
          COMMIT_LOG_PLACEHOLDER
          ```

          ## Changed Files
          ```
          CHANGED_FILES_PLACEHOLDER
          ```

          ---
          _Auto-generated PR. Update title and description before merging._
          BODY_EOF

          sed -i "s|BRANCH_PLACEHOLDER|$BRANCH|g" /tmp/pr-body.md
          sed -i "s|ACTOR_PLACEHOLDER|$ACTOR|g" /tmp/pr-body.md
          sed -i "s|PUSHED_PLACEHOLDER|$PUSHED|g" /tmp/pr-body.md
          sed -i "s|COMMIT_LOG_PLACEHOLDER|$COMMIT_LOG|g" /tmp/pr-body.md
          sed -i "s|CHANGED_FILES_PLACEHOLDER|$CHANGED_FILES|g" /tmp/pr-body.md

          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body-file /tmp/pr-body.md
